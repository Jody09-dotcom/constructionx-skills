<!doctype html>
<html lang="en"><head>
<meta charset="utf-8">
<title>ConstructionX Skills Pack, product shots</title>
<style>
  :root { --bg:#1e293b; --card:#334155; --text:#f1f5f9; --accent:#22c55e; }
  * { box-sizing: border-box; }
  body { margin:0; background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    padding: 40px 32px; }
  h1 { font-size: 28px; margin: 0 0 6px; }
  h1 .accent { color: var(--accent); }
  p.sub { color:#94a3b8; margin:0 0 32px; }
  .grid {
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 20px; max-width: 1400px; margin: 0 auto;
  }
  .card { background: var(--card); border: 1px solid rgba(34,197,94,0.25);
    border-radius: 12px; overflow: hidden; }
  .card img { display:block; width:100%; height:auto; }
  .label { padding: 12px 16px; color: var(--accent); font-weight: 600;
    letter-spacing: 0.02em; border-top: 1px solid rgba(34,197,94,0.2); }
  footer { max-width: 1400px; margin: 32px auto 0; color: #94a3b8; font-size: 13px; text-align: center; }
</style></head><body>
<h1>Skills Pack, <span class="accent">product shots</span></h1>
<p class="sub">5 locked-style shots, GPT Image 2. Drop-in ready for the public marketplace listing.</p>
<div class="grid">
    <div class="card">
      <img src="site-diary.png" alt="Site Diary">
      <div class="label">Site Diary</div>
    </div>

    <div class="card">
      <img src="rams-generator.png" alt="RAMS Generator">
      <div class="label">RAMS Generator</div>
    </div>

    <div class="card">
      <img src="cdm-2015-check.png" alt="CDM 2015 Check">
      <div class="label">CDM 2015 Check</div>
    </div>

    <div class="card">
      <img src="cis-verification.png" alt="CIS Verification">
      <div class="label">CIS Verification</div>
    </div>

    <div class="card">
      <img src="nhbc-lookup.png" alt="NHBC Lookup">
      <div class="label">NHBC Lookup</div>
    </div></div>
<footer>Save-to: deploy/constructionx-skills/assets/</footer>
</body></html>
